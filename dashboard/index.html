<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Favicons / app icons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/dashboard/manifest.webmanifest">
  <meta name="theme-color" content="#9060E0">
  <!-- Social share (Open Graph / Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Link in HK">
  <meta property="og:title" content="會員專區 · Link in HK">
  <meta property="og:description" content="Link in HK 用 AI 學習你嘅性格同喜好，每星期為你配對最適合嘅人，再幫你度身訂造第一次 date。">
  <meta property="og:image" content="https://linkinhk.com/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="1200">
  <meta property="og:url" content="https://www.linkinhk.com/dashboard/">
  <meta property="og:locale" content="zh_HK">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="會員專區 · Link in HK">
  <meta name="twitter:description" content="Link in HK 用 AI 學習你嘅性格同喜好，每星期為你配對最適合嘅人，再幫你度身訂造第一次 date。">
  <meta name="twitter:image" content="https://linkinhk.com/og-default.png">
  <title>會員專區 · Link in HK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <link rel="stylesheet" href="/dashboard/dashboard-layout.css">
  <!-- Loads early so it can replace a blank #root with a friendly fallback
       if the app fails to mount. -->
  <script src="/shared/boot-fallback.js"></script>
  <style>
    /* Dashboard-only: reserve space under bottom nav */
    body { padding-bottom: 80px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Capture the install prompt ASAP (it can fire before the app module loads).
       Stashed for the Add-to-Home-Screen banner in promo.js. -->
  <script>
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      window.deferredInstallPrompt = e;
      window.dispatchEvent(new Event("promo-install-available"));
    });
    window.addEventListener("appinstalled", function () {
      window.deferredInstallPrompt = null;
      window.dispatchEvent(new Event("promo-installed"));
    });
  </script>

  <!-- Shared globals (classic scripts), run before the deferred module which reads
       them. Order: config → shared-options → form-options → ideal-fields. -->
  <script src="/shared/config.js"></script>
  <script src="/shared/error-utils.js"></script>
  <script src="/shared/shared-options.js"></script>
  <script src="/shared/form-options.js"></script>
  <script src="/shared/ideal-fields.js"></script>

  <!-- Dashboard app (lib + shared components + layout + tabs + app), compiled by Vite. -->
  <script type="module" src="./main.jsx"></script>

  <!-- Register the dashboard service worker (push notifications). Plain JS,
       scoped to /dashboard/. -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("/dashboard/sw.js", { scope: "/dashboard/" })
          .catch(function (e) { console.warn("SW register failed", e); });
      });
    }
  </script>
</body>
</html>
