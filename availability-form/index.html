<head>

  <title>Link in HK — 填寫可見面時段</title>
  <meta name="description" content="告訴我哋你幾時方便見面,等我哋安排一個雙方都啱嘅時間">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <style>
    /* Page-specific: availability grid only. All other styling comes from /shared/design-system.css */

    /* Make form-card non-clipping so the page (not the card) is the
       scroll container for the sticky step-2 header. Round the decorative
       top bar to compensate for the dropped overflow clip. */
    .form-card { overflow: visible; }
    .form-card::before {
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
    }
    @media (max-width: 500px) {
      .form-card::before {
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
      }
    }

    .avail-intro {
      background: var(--yellow-bg);
      border-left: 4px solid var(--yellow-border);
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-hint);
      margin-bottom: 20px;
    }

    .avail-table {
      width: 100%;
    }
    .avail-thead,
    .avail-tbody {
      display: grid;
      grid-template-columns: minmax(60px, 88px) repeat(4, 1fr);
      gap: 4px;
    }
    .avail-thead {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--card);
      padding-bottom: 4px;
    }
    .avail-head-cell,
    .avail-date-cell,
    .avail-slot-cell {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .avail-head-cell {
      flex-direction: column;
      gap: 1px;
      padding: 6px 2px 8px;
      min-height: 52px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-light);
    }
    .avail-head-cell .head-time {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-light);
      font-family: var(--font-accent);
      letter-spacing: 0.2px;
    }
    .avail-head-cell.avail-head-corner { border-bottom-color: transparent; }

    .avail-date-cell {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.3;
      font-weight: 500;
      padding: 2px;
      flex-direction: column;
      gap: 1px;
    }
    .avail-date-cell.weekend {
      color: var(--accent);
      font-weight: 600;
    }
    .avail-date-cell .date-dow {
      font-size: 10px;
      opacity: 0.75;
    }

    .avail-slot-cell {
      border: 2px solid transparent;
      background: var(--chip-bg);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      padding: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .avail-slot-cell:active { transform: scale(0.92); }
    .avail-slot-cell.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .avail-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .avail-reset-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .avail-reset-btn:hover { background: var(--accent-soft); }

    /* ── Activity ranking (matches member-form love language) ── */
    .field-hint { font-size: 12px; color: var(--text-light); margin-bottom: 8px; line-height: 1.5; }
    .rank-list { display: flex; flex-direction: column; gap: 8px; }
    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      background: var(--white);
      border: 2px solid #e8e8e8;
      user-select: none;
    }
    .rank-num {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .rank-label { font-size: 14px; font-weight: 500; }
    .rank-sublabel { font-size: 12px; color: var(--text-light); }
    .rank-arrows { display: flex; flex-direction: column; gap: 2px; }
    .rank-arrow {
      width: 28px; height: 22px;
      border: none;
      background: var(--chip-bg);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .rank-arrow:hover { background: #ddd; }
    .rank-arrow:disabled { opacity: 0.3; cursor: default; }

    /* Tight mobile: shrink date label column + gaps so the grid never overflows */
    @media (max-width: 380px) {
      .avail-thead,
      .avail-tbody {
        grid-template-columns: minmax(52px, 64px) repeat(4, 1fr);
        gap: 3px;
      }
      .avail-thead { padding-bottom: 3px; }
      .avail-date-cell { font-size: 11px; }
      .avail-head-cell { font-size: 12px; }
      .avail-head-cell .head-time { font-size: 9px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/shared/config.js"></script>
  <script type="module" src="./main.jsx"></script>
</body>
</html>
