<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <!-- Favicons / app icons -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#9060E0">
  <!-- Social share (Open Graph / Twitter) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Link in HK">
  <meta property="og:title" content="會員登入 · Link in HK">
  <meta property="og:description" content="Link in HK 會員登入">
  <meta property="og:image" content="https://linkinhk.com/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="1200">
  <meta property="og:url" content="https://www.linkinhk.com/login/">
  <meta property="og:locale" content="zh_HK">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="會員登入 · Link in HK">
  <meta name="twitter:description" content="Link in HK 會員登入">
  <meta name="twitter:image" content="https://linkinhk.com/og-default.png">
  <title>會員登入 · Link in HK</title>
  <meta name="description" content="Link in HK 會員登入" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <!-- Loads early so it can replace a blank #root with a friendly fallback
       if the app fails to mount. -->
  <script src="/shared/boot-fallback.js"></script>
  <script src="/shared/config.js"></script>
  <style>
    /* Login page-specific styles. Tokens + shared components come from design-system.css. */

    .login-header {
      padding: 36px 24px 0;
      text-align: center;
    }
    .login-logo { height: 22px; opacity: 0.8; margin-bottom: 24px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .login-subtitle { font-size: 14px; color: var(--text-light); line-height: 1.7; }
    .login-subtitle-strong { color: var(--text); font-weight: 600; }

    .login-body { padding: 24px 24px 8px; }
    .login-nav-row { padding: 8px 24px 20px; }

    .otp-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent-soft);
      border: 2px solid rgba(144, 96, 224, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 16px;
    }

    .code-input {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4em;
      padding: 16px;
      font-family: var(--font-accent);
    }

    .error-box {
      margin-bottom: 16px;
      padding: 12px;
      background: var(--red-bg);
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 13px;
      color: #b91c1c;
    }
    .error-box .error-report-link { color: #b91c1c; }
    .error-box .error-report-link a { color: var(--accent); }

    .login-meta {
      margin-top: 4px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .login-link {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-light);
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .login-link:hover { color: var(--accent); }
    .login-link.underline { text-decoration: underline; text-underline-offset: 2px; }
    .login-link:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-footer {
      padding: 16px 24px 24px;
      text-align: center;
      border-top: 1px solid var(--border-light);
    }
    .login-footer-text { font-size: 13px; color: var(--text-light); line-height: 1.7; }
    .login-footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .login-footer-text a:hover { text-decoration: underline; text-underline-offset: 2px; }

    .check-screen { padding: 64px 24px; text-align: center; }

    .debug-box {
      background: var(--chip-bg);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      text-align: left;
    }
    .debug-box-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
    .debug-box-value {
      font-size: 11px;
      color: var(--text-hint);
      font-family: var(--font-accent);
      word-break: break-all;
    }

    .site-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-top: 16px;
      font-family: var(--font-accent);
      letter-spacing: 0.5px;
    }

    @media (max-width: 500px) {
      .login-header { padding: 28px 20px 0; }
      .login-body { padding: 20px 20px 4px; }
      .login-nav-row { padding: 8px 20px 18px; }
      .login-footer { padding: 14px 20px 22px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module" src="./main.jsx"></script>
</body>
</html>
